name: Sync Secrets to Key Vault

# GitHub Secrets에 저장된 실제 값을 Azure Key Vault로 안전하게 동기화합니다.
# 시크릿 값은 로그에 노출되지 않습니다 (az CLI 직접 주입).
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  KEY_VAULT_NAME: kv-rcacopilotprod
  FUNCTION_APP: func-rca-copilot-prod
  RESOURCE_GROUP: rg-rca-copilot-prod

jobs:
  sync:
    name: Sync GitHub Secrets to Key Vault
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Grant runner access to Key Vault
        run: |
          OBJECT_ID=$(az ad signed-in-user show --query id -o tsv 2>/dev/null || echo "")
          SP_ID="${{ secrets.AZURE_CLIENT_ID }}"
          az keyvault set-policy --name "$KEY_VAULT_NAME" \
            --spn "$SP_ID" \
            --secret-permissions get list set 2>/dev/null || echo "Policy may already exist"

      - name: Update Key Vault secrets
        run: |
          set -e
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" \
            --name azure-openai-endpoint \
            --value "${{ secrets.AZURE_OPENAI_ENDPOINT }}" --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" \
            --name azure-openai-key \
            --value "${{ secrets.AZURE_OPENAI_KEY }}" --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" \
            --name github-models-token \
            --value "${{ secrets.GH_MODELS_TOKEN }}" --output none
          az keyvault secret set --vault-name "$KEY_VAULT_NAME" \
            --name slack-webhook-url \
            --value "${{ secrets.SLACK_WEBHOOK_URL }}" --output none
          echo "✅ Key Vault secrets updated"

      - name: Restart Function App to reload secrets
        run: |
          az functionapp restart --name "$FUNCTION_APP" --resource-group "$RESOURCE_GROUP"
          echo "✅ Function App restarted"
